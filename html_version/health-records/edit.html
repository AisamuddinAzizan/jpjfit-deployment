    <nav class="quick-links" aria-label="Quick Links">
      <a href="../index.html">Home</a>

  <main>
    <div class="card" style="margin-bottom: 14px;">
      <h1 style="margin:0 0 6px 0;">health-records - edit</h1>
      <p class="meta" style="margin:0;">Generated from: resources/views/health-records/edit.blade.php</p>
    </div>
    
    
        <h1 class="text-2xl font-extrabold text-slate-800">Edit Health Record</h1>
    

    <div class="panel-card p-5">
        <form method="POST" action="edit.html">
        <div class="grid gap-4 md:grid-cols-2">
          <div>
            <label class="text-sm font-medium text-slate-700">Participant</label>
            <select class="form-select" name="participant_id" required>
              <option value="1">P-001 - Ahmad Rahman</option>
              <option value="2">P-002 - Siti Zulaikha</option>
            </select>
          </div>
          <div>
            <label class="text-sm font-medium text-slate-700">Test Session</label>
            <select class="form-select" name="test_session_id" required>
              <option value="1">UKJK-2026-03 - Batch A</option>
              <option value="2">UKJK-2026-02 - Batch B</option>
            </select>
          </div>
          <div>
            <label class="text-sm font-medium text-slate-700">Height (cm)</label>
            <input class="form-input" name="height_cm" type="number" step="0.01" value="170" required>
          </div>
          <div>
            <label class="text-sm font-medium text-slate-700">Weight (kg)</label>
            <input class="form-input" name="weight_kg" type="number" step="0.01" value="72" required>
          </div>
          <div>
            <label class="text-sm font-medium text-slate-700">Blood Pressure Systolic</label>
            <input class="form-input" name="blood_pressure_systolic" type="number" value="120" required>
          </div>
          <div>
            <label class="text-sm font-medium text-slate-700">Blood Pressure Diastolic</label>
            <input class="form-input" name="blood_pressure_diastolic" type="number" value="80" required>
          </div>
          <div>
            <label class="text-sm font-medium text-slate-700">Glucose (mmol/L)</label>
            <input class="form-input" name="glucose_mmol" type="number" step="0.01" value="5.1">
          </div>
          <div>
            <label class="text-sm font-medium text-slate-700">Cholesterol (mmol/L)</label>
            <input class="form-input" name="cholesterol_mmol" type="number" step="0.01" value="4.9">
          </div>
          <div class="md:col-span-2">
            <label class="text-sm font-medium text-slate-700">Remarks</label>
            <textarea class="form-input" name="remarks" rows="3">Routine follow-up record.</textarea>
          </div>
        </div>

        <div class="mt-6 flex gap-3">
          <button class="btn-primary" type="submit">Update Record</button>
          <a href="index.html" class="btn-secondary">Cancel</a>
        </div>
        </form>
    </div>


  </main>
  <script src="../assets/local-crud.js"></script>
